error_log /var/log/nginx/local_insrv5_error.log debug;
access_log /var/log/nginx/local_insrv5_access.log;

# --- Redmine ---
server {
    listen 443 ssl;
    http2 on;
    server_name tareas.insrv5.local;
    
    ssl_certificate /etc/ssl/certs/insrv5.local.crt;
    ssl_certificate_key /etc/ssl/certs/insrv5.local.key;

    allow 192.168.5.0/24;   # Red pública de Docker
    allow 192.168.51.0/24;  # Red privada de Docker
    allow 10.8.0.0/24;      # Reemplaza esto por la subred de tu VPN real
    deny all;               # Expulsa a cualquiera que no esté en la lista

    set $req_role "Trabajador";
    include /etc/nginx/conf.d/snippets/insrv5_auth.conf;

    location / {
        proxy_pass http://192.168.51.10:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

