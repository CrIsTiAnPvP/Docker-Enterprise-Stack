# --- Nóminas ---
server {
    listen 443 ssl;
    http2 on;
    server_name nominas.insrv5.local;

    set $req_role "RRHH,Administracion";
    include /etc/nginx/conf.d/snippets/insrv5_auth.conf;

    location ~* ^/(font|makefont|fpdf\.php) {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://192.168.51.2/apps/nominas/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- GESTOR DE RECURSOS ---
server {
    listen 443 ssl;
    http2 on;
    server_name recursos.insrv5.local;

    ssl_certificate /etc/ssl/certs/insrv5.local.crt;
    ssl_certificate_key /etc/ssl/certs/insrv5.local.key;

    allow 192.168.5.0/24;
    allow 192.168.51.0/24;
    allow 10.8.0.0/24;
    deny all;

    set $req_role "Trabajador";
    include /etc/nginx/conf.d/snippets/insrv5_auth.conf;

    location ^~ /archivos {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://192.168.51.2/apps/recursos/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    }

