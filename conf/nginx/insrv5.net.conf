error_log /var/log/nginx/net_insrv5_error.log debug;
access_log /var/log/nginx/net_insrv5_access.log;

server {
	listen 443 ssl;

	http2 on;

	ssl_certificate /etc/ssl/certs/insrv5.net.crt;
	ssl_certificate_key /etc/ssl/certs/insrv5.net.key;


	server_name insrv5.net www.insrv5.net;

	error_page 404 = /error404;
	error_page 401 = https://insrv5.net/users/index.php?return=$scheme://$host$request_uri;

	location ^~ /errors/ {
        return 404; 
    }

	location = /error404 {
		internal;
		proxy_pass http://192.168.51.2/errors/404.html;
	}

	location / {
		proxy_pass http://192.168.5.2/;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

server {
	listen 80;
	server_name insrv5.net www.insrv5.net;

	return 301 https://$host$request_uri;
}