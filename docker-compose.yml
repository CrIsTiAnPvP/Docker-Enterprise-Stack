name: Management-Web

services:

  dns:
    image: ubuntu/bind9:latest
    container_name: dns
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ./conf/bind9/named.conf.options:/etc/bind/named.conf.options
      - ./conf/bind9/named.conf.local:/etc/bind/named.conf.local
      - ./conf/bind9/db.insrv5.net:/etc/bind/db.insrv5.net
      - ./conf/bind9/db.insrv5.local:/etc/bind/db.insrv5.local
      - ./log/dns:/var/log/bind9
    networks:
      insrv_net:
        ipv4_address: 192.168.5.253
      insrv_local:
        ipv4_address: 192.168.51.253

  openldap:
    image: osixia/openldap:latest
    container_name: ldap-server
    command: --copy-service
    environment:
      - LDAP_ORGANISATION=Internal SL
      - LDAP_DOMAIN=insrv5.local
      - LDAP_ADMIN_PASSWORD=admnpasswd
      # --- LDAP Secure (SSL/TLS)---
      - LDAP_TLS=true
      - LDAP_TLS_VERIFY_CLIENT=try
      - LDAP_TLS_CRT_FILENAME=insrv5.local.crt
      - LDAP_TLS_KEY_FILENAME=insrv5.local.key
      - LDAP_TLS_CA_CRT_FILENAME=insrv5.local.crt
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./conf/ssl/certs:/container/service/slapd/assets/certs/
      - ./conf/ldap/01-init.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/01-init.ldif
      - ./conf/ldap/02-acl.sh:/container/service/slapd/assets/config/bootstrap/ldif/custom/02-acl.sh
    depends_on:
      - dns
    dns:
      - 192.168.51.253
    networks:
      insrv_local:
        ipv4_address: 192.168.51.252

  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: ldap-admin
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
      - PHPLDAPADMIN_SERVER_NAME=Internal5 LDAP
    depends_on:
      - openldap
    networks:
      insrv_local:
        ipv4_address: 192.168.51.4

  db:
    image: mysql
    container_name: db
    environment:
      - MYSQL_ROOT_PASSWORD=root # Esto en prod. debería ir en un .env
      - MYSQL_DATABASE=insrv5_db # Esto en prod. debería ir en un .env
      - MYSQL_USER=user # Esto en prod. debería ir en un .env
      - MYSQL_PASSWORD=1234 # Esto en prod. debería ir en un .env
    volumes:
      - db_data:/var/lib/mysql
      - ./log/mysql:/var/log/mysql
      - ./conf/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      insrv_local:
        ipv4_address: 192.168.51.250
    
  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    environment:
      - PMA_HOST=db
      - PMA_USER=user # Esto en prod. debería ir en un .env
      - PMA_PASSWORD=1234 # Esto en prod. debería ir en un .env
    depends_on:
      - db
    networks:
      insrv_local:
        ipv4_address: 192.168.51.3
    
  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./conf/nginx:/etc/nginx/conf.d:ro
      - ./conf/ssl/certs:/etc/ssl/certs:ro
      - ./log/nginx:/var/log/nginx
    ports:
      - "80:80"    
      - "443:443"  
    networks:
      insrv_net:
        ipv4_address: 192.168.5.10
      insrv_local:
        ipv4_address: 192.168.51.100
        
  apache:
    build:
      context: ./Docker/apache
    container_name: apache
    environment:
      - LDAPTLS_REQCERT=never
    volumes:
      - ./conf/www:/var/www/html/
      - ./log/apache:/var/log/apache2
    dns:
      - 192.168.51.253
    networks:
      insrv_local:
        ipv4_address: 192.168.51.2
      insrv_net:
        ipv4_address: 192.168.5.2
    depends_on:
      - dns
      - db
      - openldap

# INTEGRACIÓN MailServer (docker-mailserver)

  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.insrv5.local
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "993:993"
    volumes:
      - ./mail/mail-data:/var/mail
      - ./mail/mail-state:/var/mail-state
      - ./mail/mail-logs:/var/log/mail
      - ./mail/config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
      - ./conf/ssl/certs:/etc/ssl/custom:ro
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - ENABLE_POSTGREY=0
      - ONE_DIR=1
      - DOMAINNAME=insrv5.local
      # --- INTEGRACIÓN CON LDAP ---
      - ACCOUNT_PROVISIONER=LDAP
      - LDAP_SERVER_HOST=192.168.51.252
      - LDAP_SEARCH_BASE=ou=usuarios,dc=insrv5,dc=local
      - LDAP_BIND_DN=cn=admin,dc=insrv5,dc=local
      - LDAP_BIND_PW=admnpasswd
      - LDAP_QUERY_FILTER_USER=(&(objectClass=inetOrgPerson)(mail=%s))
      # --- Configuración SSL/TLS ---
      - SSL_TYPE=manual
      - SSL_CERT_PATH=/etc/ssl/custom/insrv5.local.crt
      - SSL_KEY_PATH=/etc/ssl/custom/insrv5.local.key
    networks:
      insrv_local:
        ipv4_address: 192.168.51.25
    dns:
      - 192.168.51.253
    depends_on:
      - dns
      - openldap

  # Redmine
  # INTEGRACIÓN REDMINE (Gestor de Tareas y Control de Horas)
  redmine:
    image: redmine:trixie
    container_name: redmine
    hostname: tareas.insrv5.local
    environment:
      - REDMINE_DB_MYSQL=db
      - REDMINE_DB_DATABASE=redmine_db
      - REDMINE_DB_USERNAME=user
      - REDMINE_DB_PASSWORD=1234
    volumes:
      - ./redmine/files:/usr/src/redmine/files
    networks:
      insrv_local:
        ipv4_address: 192.168.51.10
    dns:
      - 192.168.51.253
    depends_on:
      - db
      - openldap

volumes:
  db_data:
  ldap_data:
  ldap_config:

networks:
  insrv_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.5.0/24
  insrv_local:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.51.0/24
